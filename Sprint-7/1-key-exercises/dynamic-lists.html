<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprint 7 - Dynamic Lists Practice</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
    .todo-container { border: 1px solid #ddd; padding: 20px; border-radius: 5px; }
    input { padding: 10px; width: 70%; margin-right: 10px; }
    button { padding: 10px 20px; cursor: pointer; }
    ul { list-style-type: none; padding: 0; }
    li { padding: 10px; margin: 5px 0; background-color: #f0f0f0; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>Todo List</h1>
  
  <div class="todo-container">
    <input type="text" id="todo-input" placeholder="Enter a new task">
    <button id="add-button">Add</button>
    
    <ul id="todo-list">
      <!-- JavaScript will add items here -->
    </ul>
  </div>
  
  <script src="5-dynamic-lists.js"></script>
</body>
</html>
