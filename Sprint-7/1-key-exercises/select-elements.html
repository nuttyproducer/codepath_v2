<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprint 7 - Select Elements Practice</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
    .product-item { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    .cart-total { font-size: 20px; font-weight: bold; color: green; }
  </style>
</head>
<body>
  <h1 id="title">Product Catalog</h1>
  
  <div class="product-item">
    <h3>Laptop</h3>
    <p>Price: $999</p>
    <button class="add-to-cart">Add to Cart</button>
  </div>
  
  <div class="product-item">
    <h3>Mouse</h3>
    <p>Price: $29</p>
    <button class="add-to-cart">Add to Cart</button>
  </div>
  
  <div class="product-item">
    <h3>Keyboard</h3>
    <p>Price: $79</p>
    <button class="add-to-cart">Add to Cart</button>
  </div>
  
  <div class="cart-total">Total: $0</div>
  
  <script src="1-select-elements.js"></script>
</body>
</html>
