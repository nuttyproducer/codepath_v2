<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Validation</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
    .form-container { border: 1px solid #ddd; padding: 30px; border-radius: 5px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 3px; }
    input.invalid { border-color: red; }
    .error-message { color: red; font-size: 14px; margin-top: 5px; display: block; }
    button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
    button:hover { background-color: #0056b3; }
    .success { color: green; font-weight: bold; padding: 15px; background-color: #d4edda; border: 1px solid #c3e6cb; border-radius: 5px; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Registration Form</h1>
  
  <div class="form-container">
    <form id="registration-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name">
        <span class="error-message" id="name-error"></span>
      </div>
      
      <div class="form-group">
        <label for="email">Email</label>
        <input type="text" id="email" name="email">
        <span class="error-message" id="email-error"></span>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password">
        <span class="error-message" id="password-error"></span>
      </div>
      
      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm-password">
        <span class="error-message" id="confirm-password-error"></span>
      </div>
      
      <button type="submit">Register</button>
    </form>
    
    <div id="success-message"></div>
  </div>
  
  <script src="3-form-validation.js"></script>
</body>
</html>
