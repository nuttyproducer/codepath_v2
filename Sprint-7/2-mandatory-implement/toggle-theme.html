<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Theme Toggle</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
        transition:
          background-color 0.3s,
          color 0.3s;
      }

      /* Light Theme */
      body.light-theme {
        background-color: #ffffff;
        color: #333333;
      }

      /* Dark Theme */
      body.dark-theme {
        background-color: #1a1a1a;
        color: #f0f0f0;
      }

      .card {
        border: 1px solid;
        padding: 20px;
        margin: 20px 0;
        border-radius: 5px;
        transition:
          background-color 0.3s,
          border-color 0.3s;
      }

      .light-theme .card {
        background-color: #f9f9f9;
        border-color: #ddd;
      }

      .dark-theme .card {
        background-color: #2a2a2a;
        border-color: #444;
      }

      button {
        padding: 12px 24px;
        font-size: 16px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s;
      }

      .light-theme button {
        background-color: #333;
        color: white;
      }

      .light-theme button:hover {
        background-color: #555;
      }

      .dark-theme button {
        background-color: #f0f0f0;
        color: #333;
      }

      .dark-theme button:hover {
        background-color: #ddd;
      }
    </style>
  </head>
  <body class="light-theme">
    <h1>Theme Toggle Demo</h1>

    <button id="theme-toggle">Switch to Dark Mode</button>

    <div class="card">
      <h2>Card Title</h2>
      <p>This is a sample card that changes style based on the theme.</p>
      <p>Click the button above to toggle between light and dark themes.</p>
    </div>

    <div class="card">
      <h2>Another Card</h2>
      <p>
        Your theme preference will be saved and restored when you reload the
        page.
      </p>
    </div>

    <script src="4-toggle-theme.js"></script>
  </body>
</html>
